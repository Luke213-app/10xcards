# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: >-
  AI code-reviewer regression eval. Runs the real reviewer agent (via a custom
  provider that calls reviewCode) over a planted-flaw React 16->19 migration diff
  across three OpenRouter models, judged by a neutral fourth model, with static
  assertions that the output matches the review contract and the verdict is "fail".

# Each provider is the SAME custom agent (eval/providers/reviewerAgent.ts) bound to
# a different model via config.model, so the matrix compares models on identical
# prompt + tool + decision logic. The provider reports id `reviewer:<model>`.
providers:
  - id: file://providers/reviewerAgent.ts
    label: glm-5.2
    config:
      model: z-ai/glm-5.2
  - id: file://providers/reviewerAgent.ts
    label: qwen3-max
    config:
      model: qwen/qwen3-max
  - id: file://providers/reviewerAgent.ts
    label: claude-sonnet-4.6
    config:
      model: anthropic/claude-sonnet-4.6

# The provider ignores the rendered prompt and reads the diff from `vars`; this
# passthrough just keeps the `diff` var wired so promptfoo renders one prompt.
prompts:
  - "{{diff}}"

# Neutral LLM judge for the llm-rubric assertion — deliberately NOT one of the
# three models under test, to avoid a model grading its own review.
defaultTest:
  options:
    provider:
      id: openrouter:openai/gpt-5.2
      config:
        temperature: 0

tests:
  - description: Catches all three planted flaws in the React 16->19 migration and fails the review
    vars:
      title: "Migrate UserList and app entry point from React 16 to React 19"
      diff: file://fixtures/react-migration.diff
      planted_flaws: file://fixtures/planted-flaws.md
    assert:
      # 1. Coarse contract shape: valid JSON with the 5 integer scores + decision fields.
      - type: is-json
        value:
          type: object
          required: [scores, average, verdict, findings, vetoes]
          properties:
            scores:
              type: object
              required: [correctness, security, idiomaticity, complexity, testCoverage]
              properties:
                correctness: { type: integer, minimum: 1, maximum: 10 }
                security: { type: integer, minimum: 1, maximum: 10 }
                idiomaticity: { type: integer, minimum: 1, maximum: 10 }
                complexity: { type: integer, minimum: 1, maximum: 10 }
                testCoverage: { type: integer, minimum: 1, maximum: 10 }
            average: { type: number }
            verdict: { type: string, enum: [pass, fail] }
            findings: { type: array }
            vetoes: { type: array, items: { type: string } }

      # 2. Authoritative contract check + must-fail gate, reusing the zod schema.
      - type: javascript
        value: file://assertions/contract.ts

      # 3. Neutral judge must confirm ALL THREE planted flaws were identified.
      - type: llm-rubric
        threshold: 1
        value: >-
          You are grading an AI code review. The OUTPUT is a JSON object of code-review
          findings produced for a React 16 to React 19 migration diff.

          The diff contains exactly THREE deliberately-planted flaws, described here by
          mechanism:

          {{planted_flaws}}

          Read the OUTPUT's `findings` (and scores). Decide, for EACH of the three
          flaws, whether the review identified that specific flaw by its real
          mechanism (not a vague or generic remark). A flaw counts as caught only if a
          finding clearly names the actual problem:
          - Flaw 1: ReactDOM.render no longer works / is removed in React 19 (must use createRoot).
          - Flaw 2: defaultProps is ignored on function components in React 19 (default title/endpoint is lost).
          - Flaw 3: the useEffect is missing the `endpoint` dependency, so it never refetches (stale data).

          Score = (number of flaws correctly identified) / 3. Pass ONLY if all three
          are caught (score 1.0). In your reason, list which flaws were caught and
          which were missed.
